name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  ci:
    name: Format, lint, test, and document
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install stable Rust
        run: |
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy
          rustup override set stable
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test default features
        run: cargo test --locked --all-targets

      # Keep the public boundary explicit if the default feature set changes.
      - name: Test public feature
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features public

      - name: Test without default features
        run: cargo test --locked --all-targets --no-default-features

      - name: Test authenticated feature
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features authenticated

      - name: Test wallet feature
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features wallet

      - name: Test execution feature
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features execution

      - name: Test bridge feature
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features bridge

      - name: Test full feature bundle
        run: >
          cargo test --locked --all-targets
          --no-default-features
          --features full

      - name: Test all features
        run: cargo test --locked --all-targets --all-features

      - name: Test documentation examples
        run: cargo test --locked --doc --all-features

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --no-deps --all-features
